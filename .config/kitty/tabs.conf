tab_bar_style separator
tab_bar_edge top
tab_separator ""
tab_bar_min_tabs 2

# Inactive tabs: gray text on bg1, with bg2 accent
tab_title_template "{fmt.fg._665c54}{fmt.bg._282828}{fmt.fg._a89984}{fmt.bg._665c54} ({index}) {title} {fmt.fg._665c54}{fmt.bg._282828} "
# Active tabs: dark text on yellow accent (gruvbox signature look)
active_tab_title_template "{fmt.fg._d79921}{fmt.bg._282828}{fmt.fg._282828}{fmt.bg._d79921} ({index}) {title} {fmt.fg._d79921}{fmt.bg._282828} "
active_tab_font_style bold

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

map ctrl+t new_tab
map ctrl+w close_tab

map ctrl+shift+page_up move_tab_backward
map ctrl+shift+page_down move_tab_forward
